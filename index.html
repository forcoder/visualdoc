  <script>
    let currentTemplate = 'business';
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('content-' + tab).classList.add('active');
      document.querySelectorAll('nav button').forEach(el => {
        el.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
        el.classList.add('text-gray-600');
      });
      document.getElementById('tab-' + tab).classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
      document.getElementById('tab-' + tab).classList.remove('text-gray-600');
    }

    function generateDiagram() {
      const text = document.getElementById('visual-input').value;
      const lines = text.split('\n').filter(line => line.trim());
      let code = 'graph TD\n';
      let nodeIndex = 0;
      const nodes = [];
      lines.forEach((line) => {
        const trimmed = line.trim();
        if (trimmed.startsWith('# ')) {
          const content = trimmed.replace('# ', '');
          nodeIndex++;
          code += `  A[${content}]\n`;
          nodes.push('A');
        } else if (trimmed.startsWith('## ')) {
          const content = trimmed.replace('## ', '');
          const nodeId = String.fromCharCode(65 + nodeIndex);
          nodeIndex++;
          code += `  ${nodeId}[${content}]\n`;
          nodes.push(nodeId);
          if (nodes.length > 1) code += `  ${nodes[nodes.length - 2]} --> ${nodeId}\n`;
        }
      });
      if (nodes.length === 0) code = `graph TD\n  A[请输入内容] --> B[点击生成图表]`;
      const preview = document.getElementById('visual-preview');
      preview.innerHTML = `<div class="mermaid">${code}</div>`;
      mermaid.run({ nodes: preview.querySelectorAll('.mermaid') });
    }

    function exportVisualPNG() {
      const preview = document.getElementById('visual-preview');
      html2canvas(preview, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'chart.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    function exportVisualPDF() {
      const preview = document.getElementById('visual-preview');
      html2canvas(preview, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/png');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save('chart.pdf');
      });
    }

    function updateMarkdownPreview() {
      const markdown = document.getElementById('markdown-input').value;
      const html = marked.parse(markdown);
      document.getElementById('markdown-preview').innerHTML = html;
    }

    document.getElementById('markdown-input').addEventListener('input', updateMarkdownPreview);

    function selectTemplate(template) {
      currentTemplate = template;
      document.querySelectorAll('.template-card').forEach(card => {
        card.classList.remove('active', 'border-indigo-500');
        card.classList.add('border-gray-200');
      });
      document.querySelector(`[data-template="${template}"]`).classList.add('active', 'border-indigo-500');
      document.querySelector(`[data-template="${template}"]`).classList.remove('border-gray-200');
      const preview = document.getElementById('markdown-preview');
      preview.className = `preview-${template} p-8 max-w-3xl mx-auto min-h-full`;
      const templateNames = { 'business': '💼 商务蓝', 'tech': '💻 科技黑', 'nature': '🌿 清新绿', 'warm': '🧡 暖色橙', 'minimal': '⚪ 极简白' };
      document.getElementById('current-template-name').textContent = templateNames[template];
      updateMarkdownPreview();
    }

    function loadIndustryExample(example) {
      if (!example) return;
      const examples = {
        'business-plan': `# 商业计划书\n\n## 执行摘要\n\n本项目旨在通过创新的技术解决方案，解决行业痛点，创造显著的商业价值。\n\n## 市场分析\n\n### 市场规模\n- 目标市场：$10亿\n- 年增长率：25%\n- 潜在客户：100万+\n\n## 财务预测\n\n| 年度 | 收入 | 成本 | 利润 |\n|------|------|------|------|\n| 第1年 | $500K | $400K | $100K |\n| 第2年 | $2M | $1.2M | $800K |\n| 第3年 | $5M | $2.5M | $2.5M |`,
        'project-proposal': `# 项目提案\n\n## 项目背景\n\n随着数字化转型的深入，企业对于高效协作工具的需求日益增长。\n\n## 项目目标\n\n1. 提高团队协作效率 **50%**\n2. 降低沟通成本 **30%**\n3. 提升项目交付质量\n\n## 预算估算\n\n总预算：¥800,000\n\n---\n\n**项目负责人**：张经理  \n**提案日期**：2026年3月`,
        'meeting-minutes': `# 项目周会纪要\n\n## 会议信息\n\n- **时间**：2026年3月26日 14:00-15:30\n- **地点**：会议室A\n- **主持人**：项目经理\n\n## 行动计划\n\n| 任务 | 负责人 | 截止日期 |\n|------|--------|----------|\n| 修复Bug | 王开发 | 3月28日 |\n| 接口联调 | 李后端 | 3月29日 |`,
        'prd': `# 产品需求文档 (PRD)\n\n## 1. 产品概述\n\n### 1.1 产品背景\n描述产品产生的背景和市场需求...\n\n### 1.2 产品目标\n- 目标用户：xxx\n- 核心目标：解决xxx问题\n\n## 2. 功能需求\n\n| 功能 | 优先级 | 描述 |\n|------|--------|------|\n| 注册登录 | P0 | 支持手机号、邮箱注册 |\n| 个人中心 | P1 | 用户信息管理 |`
      };
      if (examples[example]) {
        document.getElementById('markdown-input').value = examples[example];
        updateMarkdownPreview();
      }
    }

    function clearMarkdown() {
      if (confirm('确定要清空内容吗？')) {
        document.getElementById('markdown-input').value = '';
        updateMarkdownPreview();
      }
    }

    function exportMarkdownPDF() {
      const preview = document.getElementById('markdown-preview');
      html2canvas(preview, { backgroundColor: '#ffffff', scale: 2, useCORS: true }).then(canvas => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/png');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();
        const imgWidth = canvas.width;
        const imgHeight = canvas.height;
        const ratio = Math.min(pdfWidth / imgWidth, pdfHeight / imgHeight);
        const imgX = (pdfWidth - imgWidth * ratio) / 2;
        let imgY = 10;
        const scaledHeight = imgHeight * ratio * (pdfWidth / (imgWidth * ratio));
        let heightLeft = scaledHeight;
        pdf.addImage(imgData, 'PNG', imgX, imgY, pdfWidth - 20, (pdfWidth - 20) * (imgHeight / imgWidth));
        heightLeft -= pdfHeight;
        while (heightLeft > 0) {
          pdf.addPage();
          pdf.addImage(imgData, 'PNG', imgX, heightLeft - scaledHeight, pdfWidth - 20, (pdfWidth - 20) * (imgHeight / imgWidth));
          heightLeft -= pdfHeight;
        }
        pdf.save('document.pdf');
      });
    }

    updateMarkdownPreview();
  </script>
</body>
